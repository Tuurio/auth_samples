server:
  port: 8085
  error:
    whitelabel:
      enabled: false

spring:
  config:
    import: optional:file:.env[.properties]
  security:
    oauth2:
      client:
        registration:
          tuurio:
            client-id: ${TUURIO_CLIENT_ID:php-KQD8}
            client-secret: ${TUURIO_CLIENT_SECRET:YOUR_CLIENT_SECRET}
            scope: ${TUURIO_SCOPE:openid,profile,email}
            authorization-grant-type: authorization_code
            redirect-uri: ${TUURIO_REDIRECT_URI:{baseUrl}/auth/callback}
        provider:
          tuurio:
            issuer-uri: ${TUURIO_ISSUER:https://test.id.tuurio.com}
            user-name-attribute: sub
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: true

tuurio:
  webhook:
    id: ${TUURIO_WEBHOOK_ID:}
    url: ${TUURIO_WEBHOOK_URL:}
    edit-url: ${TUURIO_WEBHOOK_EDIT_URL:}
    signing-secret: ${TUURIO_WEBHOOK_SIGNING_SECRET:}
    listen-path: ${TUURIO_WEBHOOK_LISTEN_PATH:/webhooks/tuurio}
    api-key-header: ${TUURIO_WEBHOOK_API_KEY_HEADER:X-Tuurio-Webhook-Key}
    api-key: ${TUURIO_WEBHOOK_API_KEY:}
